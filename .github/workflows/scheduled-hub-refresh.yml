name: Scheduled Hub Refresh

on:
  schedule:
    - cron: "0 20 * * 0" # Weekly, Sunday 20:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  create-and-assign-copilot-task:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Ensure required labels exist
        env:
          GH_TOKEN: ${{ secrets.COPILOT_AGENT_PAT }}
        run: |
          gh label create "documentation" \
            --repo madhuperera/Hub \
            --description "Documentation updates" \
            --color "0E8A16" \
            --force

          gh label create "copilot-hub-refresh" \
            --repo madhuperera/Hub \
            --description "Scheduled Copilot Hub documentation refresh" \
            --color "5319E7" \
            --force

      - name: Check for existing open Hub refresh issue
        id: existing
        env:
          GH_TOKEN: ${{ secrets.COPILOT_AGENT_PAT }}
        run: |
          ISSUE_NUMBER=$(gh issue list \
            --repo madhuperera/Hub \
            --state open \
            --label "copilot-hub-refresh" \
            --json number \
            --jq '.[0].number // empty')

          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Create Copilot task issue
        if: steps.existing.outputs.issue_number == ''
        id: create_issue
        env:
          GH_TOKEN: ${{ secrets.COPILOT_AGENT_PAT }}
        run: |
          cat > issue-body.md <<'EOF'
          Refresh the public GitHub Hub documentation.

          Source of truth:
          - `.github/public-repos.yml` contains the only approved repositories that may be listed.

          Task:
          - For each repository listed in `.github/public-repos.yml`, inspect the public repository content where possible.
          - Review each listed repository's README, repository description, topics, and recent visible activity if available.
          - Update the Hub front page so it is useful as a public landing page, not just a list of links.

          Files to update:
          - `README.md`
          - `MYREPOS.md`
          - `BOOKMARKS.md` only if useful.

          README.md should include:
          - A short professional introduction.
          - A featured repositories section.
          - A grouped repository catalogue.
          - A "recently updated" or "active areas" section if useful.
          - Clear links to the listed repositories.
          - Short explanations of what each repository is for.

          MYREPOS.md should include:
          - The full structured catalogue of approved public repositories.
          - Repository purpose.
          - Main technology area.
          - Practical use case.
          - Link to the repository.

          Hard rules:
          - Only include repositories explicitly listed in `.github/public-repos.yml`.
          - Do not discover repositories from the GitHub account.
          - Do not list private repositories.
          - Do not reference client, employer, or private work repositories.
          - Do not modify workflow files.
          - Do not add emojis.
          - Keep wording professional, understated, and useful.
          - Avoid generic filler text.

          Expected pull request:
          - Markdown-only changes unless there is a strong reason otherwise.
          - Clear PR summary explaining what changed.
          EOF

          ISSUE_URL=$(gh issue create \
            --repo madhuperera/Hub \
            --title "Refresh public GitHub Hub documentation" \
            --body-file issue-body.md \
            --label "documentation,copilot-hub-refresh")

          ISSUE_NUMBER="${ISSUE_URL##*/}"

          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Use existing issue number
        if: steps.existing.outputs.issue_number != ''
        id: use_existing
        run: |
          echo "issue_number=${{ steps.existing.outputs.issue_number }}" >> "$GITHUB_OUTPUT"

      - name: Assign issue to Copilot cloud agent
        env:
          GH_TOKEN: ${{ secrets.COPILOT_AGENT_PAT }}
          ISSUE_NUMBER: ${{ steps.create_issue.outputs.issue_number || steps.use_existing.outputs.issue_number }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/madhuperera/Hub/issues/$ISSUE_NUMBER/assignees \
            --input - <<'EOF'
          {
            "assignees": ["copilot-swe-agent[bot]"],
            "agent_assignment": {
              "target_repo": "madhuperera/Hub",
              "base_branch": "main",
              "custom_instructions": "Use `.github/public-repos.yml` as the only approved repository list. For each listed public repository, inspect available public README content, repository description, topics, and visible activity where possible. Update README.md into a useful public landing page with featured repositories, grouped categories, practical summaries, and links. Update MYREPOS.md as the detailed catalogue. Do not discover or list repositories outside the allowlist. Do not list private repositories. Do not modify workflow files. Keep wording professional and understated.",
              "custom_agent": "",
              "model": ""
            }
          }
          EOF
